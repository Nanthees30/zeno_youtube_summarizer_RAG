services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: zeno
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./zeno_server/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d zeno"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./zeno_server
      args:
        PORT: "8000"
    restart: unless-stopped
    env_file: ./zeno_server/.env
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/zeno
      PORT: "8000"
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/app/chroma_db
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  chroma_data:
